name: Sync Dockerfile to Hugging Face
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'README.md'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Dockerfile and README to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "hoopstreet@users.noreply.github.com"
          git config --global user.name "hoopstreet"
          
          # Clone the HF Space
          git clone https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Video-Generator hf_space
          
          cd hf_space
          # Delete everything currently in the Space to ensure a clean slate
          rm -rf *
          
          # Copy only the new versions from GitHub
          cp ../Dockerfile .
          cp ../README.md .
          
          git add .
          git commit -m "Sync: Clean slate and update Dockerfile/README" || exit 0
          git push origin main --force
