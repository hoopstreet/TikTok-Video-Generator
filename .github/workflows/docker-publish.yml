name: Build and Push Hoopstreet Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # Fix for the Node 20 deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./main-tiny.Dockerfile
          push: true
          # High-speed cache to make subsequent builds faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            hoopstreet/tiktok-video-generator:latest-tiny
            hoopstreet/tiktok-video-generator:9.15.4
